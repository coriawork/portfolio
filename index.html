<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#090909">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PORTFOLIO RARE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>
<body class="noisy">
    <div class="bg">
        <h1>Soy<span> Manuel Coria</span></h1>
    </div>
    
    <div class="contenedor-iconos">
        <div class="contenedor-icono">
            <i id="home" class="icono fa-solid fa-house" aria-label="Sobre mi"></i>
            <p>Sobre mi</p>
        </div>
        <div class="contenedor-icono">
            <i id="skill" class="icono fa-solid fa-gear" aria-label="Skills"></i>
            <p>Skills</p>
        </div>
        <div class="contenedor-icono">
            <i id="warning" class="icono fa-solid fa-folder-open" aria-label="Proyectos"></i>
            <p>Proyectos</p>
        </div>
        <div class="contenedor-icono">
            <i id="contact" class="icono fa-solid fa-paper-plane" aria-label="Contacto"></i>
            <p>Contactame</p>
        </div>
        <div class="contenedor-icono">
            <i id="console" class="icono fa-solid fa-terminal" style="background-color: black;" aria-label="Terminal"></i>
            <p>Terminal</p>
        </div>
    </div>
    
    <div class="tutorial">
        <div class="toast">
            <header>
                <div class="close" id="close-toast" aria-label="Cerrar">×</div>
            </header>
            <section class="toast-body">
                <p style="font-weight: 900; padding-right: 20px;">
                    Click en los iconos para navegar por el portafolio
                </p>
            </section>
        </div>
    </div>

    <script type="module" src="view_controller.js"></script>
</body>
</html>
