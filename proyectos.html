<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyectos | Manuel Coria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Mono:wght@400;700&family=Inter:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" type="image/svg+xml" href="img/black-tie-brands-solid-full.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="page-sub">
  <div class="grid-overlay" aria-hidden="true"></div>

  <main class="subpage-shell">
    <a href="index.html" class="back-home">← Volver al inicio</a>
    <h1 class="subpage-title">Proyectos</h1>
    <p class="projects-count" id="projects-count"></p>

    <ol class="projects-list" id="projects-list" aria-label="Lista de proyectos"></ol>
  </main>

  <script>
    (async function () {
      const list  = document.getElementById('projects-list');
      const count = document.getElementById('projects-count');

      let proyectos;
      try {
        const res = await fetch('data/proyectos.json');
        if (!res.ok) throw new Error();
        proyectos = await res.json();
      } catch {
        list.innerHTML = '<li style="color:var(--text-dim);font-family:var(--font-mono);font-size:13px;">No se pudo cargar la lista de proyectos.</li>';
        return;
      }

      count.textContent = proyectos.length + ' proyecto' + (proyectos.length !== 1 ? 's' : '');

      list.innerHTML = proyectos.map(p => `
        <li class="proj-card">
          <div class="proj-header">
            <span class="proj-index" aria-hidden="true">${p.index}</span>
            <h2 class="proj-name">${p.titleShort}</h2>
            ${p.badge ? `<span class="proj-badge">${p.badge}</span>` : ''}
          </div>
          <p class="proj-short">${p.lead}</p>
          <div class="proj-footer">
            <ul class="proj-tags" aria-label="Stack tecnico">
              ${p.tags.map(t => `<li class="proj-tag">${t}</li>`).join('')}
            </ul>
            <a class="proj-toggle" href="proyectos/proyecto.html?id=${p.id}">
              Ver más <span class="proj-toggle-arrow" aria-hidden="true">↗</span>
            </a>
          </div>
        </li>
      `).join('');
    })();
  </script>


</body>
</html>
